name: Security Hygiene

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: security-hygiene-${{ github.ref }}
  cancel-in-progress: true

jobs:
  security-hygiene:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Run security scan
        run: python3 scripts/security_scan.py
