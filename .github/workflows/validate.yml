name: Validate

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Validate repo and skills
        run: make validate

      - name: Grade skills
        run: python3 scripts/grade_skills.py --min-score 90

      - name: Security hygiene scan
        run: python3 scripts/security_scan.py
